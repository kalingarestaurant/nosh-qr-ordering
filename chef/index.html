<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosh QR — Chef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Poppins',sans-serif;background:#0f1117;color:#fff;height:100vh;display:flex;flex-direction:column;}
        .auth-wrap{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;}
        .auth-box{background:#1a1c2e;border-radius:16px;padding:28px;width:100%;max-width:360px;}
        .auth-logo{font-size:18px;font-weight:800;color:#f0a500;margin-bottom:20px;text-align:center;}
        .auth-err{color:#ff6b6b;font-size:12px;margin-bottom:8px;min-height:16px;}
        .auth-group{display:flex;align-items:center;gap:0;margin-bottom:10px;}
        .auth-pre{background:#252840;padding:10px 12px;border-radius:8px 0 0 8px;font-size:13px;color:#888;border:1.5px solid #2a2d3e;border-right:none;}
        .auth-inp{flex:1;padding:10px;background:#0f1117;border:1.5px solid #2a2d3e;border-radius:0 8px 8px 0;color:#fff;font-size:14px;font-family:'Poppins',sans-serif;outline:none;}
        .auth-pin{width:100%;padding:10px;background:#0f1117;border:1.5px solid #2a2d3e;border-radius:8px;color:#fff;font-size:14px;font-family:'Poppins',sans-serif;outline:none;text-align:center;letter-spacing:6px;margin-bottom:10px;}
        .btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;}
        .btn-gold{background:#f0a500;color:#1a1a1a;}
        .dash{display:none;flex:1;flex-direction:column;overflow:hidden;}
        .dash.on{display:flex;}
        .topbar{padding:10px 16px;background:#161822;border-bottom:1px solid #1e2030;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
        .t-title{font-size:16px;font-weight:800;color:#f0a500;}
        .t-sub{font-size:11px;color:#888;}
        .search-bar{padding:8px 16px;background:#161822;border-bottom:1px solid #1e2030;flex-shrink:0;}
        .search-bar input{width:100%;padding:9px 14px;background:#0f1117;border:1.5px solid #2a2d3e;border-radius:8px;color:#fff;font-size:13px;font-family:'Poppins',sans-serif;outline:none;}
        .content{flex:1;overflow-y:auto;padding:12px 16px;}
        .section-title{font-size:13px;font-weight:700;color:#f0a500;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
        .item-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#1a1c2e;border-radius:8px;margin-bottom:6px;}
        .item-row.pushed{background:#f0a50010;border:1px solid #f0a50030;}
        .item-left{flex:1;min-width:0;}
        .item-name{font-size:13px;font-weight:600;color:#e8e8e8;display:flex;align-items:center;gap:5px;}
        .item-cat{font-size:10px;color:#666;margin-top:1px;}
        .item-price{font-size:12px;color:#888;margin-top:1px;}
        .push-btn{padding:6px 14px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;flex-shrink:0;}
        .push-btn.on{background:#f0a500;color:#1a1a1a;}
        .push-btn.off{background:#ff6b6b20;color:#ff6b6b;border:1px solid #ff6b6b30;}
        .vd{width:12px;height:12px;border:1.5px solid;border-radius:2px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
        .vd::after{content:'';width:6px;height:6px;border-radius:50%;}
        .vd.veg{border-color:#0a8f0a;}.vd.veg::after{background:#0a8f0a;}
        .vd.nonveg{border-color:#ff4444;}.vd.nonveg::after{background:#ff4444;}
        .vd.egg{border-color:#f9a825;}.vd.egg::after{background:#f9a825;}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2ecc71;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;display:none;z-index:999;}
        .toast.on{display:block;}
        .pushed-count{font-size:28px;font-weight:800;color:#f0a500;text-align:center;margin:8px 0;}
        .pushed-label{font-size:11px;color:#888;text-align:center;margin-bottom:16px;}
        .tbtn{padding:5px 10px;background:#1e2030;border:1px solid #2a2d3e;border-radius:6px;color:#ccc;font-size:11px;cursor:pointer;font-family:'Poppins',sans-serif;}
    </style>
</head>
<body>

<div id="authWrap" class="auth-wrap"><div class="auth-box">
    <div class="auth-logo">🔥 NOSH — Chef / Bar Panel</div>
    <div id="loginStep">
        <div class="auth-err" id="loginErr"></div>
        <div class="auth-group"><span class="auth-pre">+91</span><input type="tel" class="auth-inp" id="inpPhone" placeholder="Phone number" maxlength="10" inputmode="numeric"></div>
        <input type="password" class="auth-pin" id="inpPin" placeholder="PIN" maxlength="6" inputmode="numeric" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn btn-gold" onclick="doLogin()">Login</button>
    </div>
</div></div>

<div id="dash" class="dash">
    <div class="topbar">
        <div>
            <div class="t-title">🔥 Today's Specials</div>
            <div class="t-sub" id="dOutlet">-</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="tbtn" style="background:#ff6b6b15;color:#ff6b6b;border-color:#ff6b6b30;" onclick="openCatControl()">🚫 Dry Day</button>
            <span style="font-size:11px;color:#666;" id="dTime"></span>
            <button class="tbtn" onclick="doLogout()">Logout</button>
        </div>
    </div>
    <div class="search-bar">
        <input type="text" id="itemSearch" placeholder="🔍 Search items to push as special..." oninput="renderItems()">
    </div>
    <div class="content">
        <div class="pushed-count" id="pushedCount">0</div>
        <div class="pushed-label">items pushed as Today's Special</div>
        
        <div id="pushedSection"></div>
        <div id="allItemsSection"></div>
    </div>
</div>

<div class="toast" id="toastEl"></div>

<!-- Category Control Modal -->
<div id="catControlModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;justify-content:center;align-items:center;">
    <div style="background:#1a1c2e;border-radius:16px;padding:24px;width:95%;max-width:550px;max-height:85vh;overflow-y:auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <span style="font-size:20px;font-weight:800;color:#fff;">🚫 Category Control</span>
            <button onclick="closeCatControl()" style="background:none;border:none;color:#888;font-size:22px;cursor:pointer;">✕</button>
        </div>
        <div style="font-size:12px;color:#888;margin-bottom:14px;">Toggle categories/subcategories OFF for today (e.g. dry day — hide alcohol). Auto-resets at daily reset.</div>
        <div id="catControlList"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyBHmyK6NTVuSsKCh-969SElL1EEnq9Ln0M",authDomain:"nosh-qr-ordering-trial.firebaseapp.com",projectId:"nosh-qr-ordering-trial",storageBucket:"nosh-qr-ordering-trial.firebasestorage.app",messagingSenderId:"672306605373",appId:"1:672306605373:web:c234755331d045142c6954"});
const db=firebase.firestore();

let staffData=null;
let allMenuItems=[];
let allCategories=[];
let upsellIds=[];

function toast(msg){const t=document.getElementById('toastEl');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2500);}

function getIST(){const n=new Date();return new Date(n.getTime()+(5.5*60*60*1000-(n.getTimezoneOffset()*60*1000)));}
function getISTTime(){const d=getIST();return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});}

// ═══════ AUTH ═══════
async function doLogin(){
    const phone='+91'+document.getElementById('inpPhone').value.trim();
    const pin=document.getElementById('inpPin').value.trim();
    document.getElementById('loginErr').textContent='';
    if(phone.length!==13){document.getElementById('loginErr').textContent='Enter 10-digit phone';return;}
    if(!pin){document.getElementById('loginErr').textContent='Enter PIN';return;}
    try{
        const snap=await db.collection('qr_staff').where('phone','==',phone).get();
        if(snap.empty){document.getElementById('loginErr').textContent='Staff not found';return;}
        const doc=snap.docs[0];const data=doc.data();
        if(data.pin!==pin){document.getElementById('loginErr').textContent='Wrong PIN';return;}
        if(data.role!=='chef'&&data.role!=='barman'&&data.role!=='super_admin'){document.getElementById('loginErr').textContent='Chef/Barman access only';return;}
        staffData={docId:doc.id,...data};
        localStorage.setItem('nosh_chef',JSON.stringify({phone,pin}));
        startDash();
    }catch(e){document.getElementById('loginErr').textContent='Error: '+e.message;}
}

function doLogout(){localStorage.removeItem('nosh_chef');location.reload();}

async function checkAutoLogin(){
    try{
        const saved=JSON.parse(localStorage.getItem('nosh_chef'));
        if(!saved)return;
        const snap=await db.collection('qr_staff').where('phone','==',saved.phone).get();
        if(snap.empty)return;
        const doc=snap.docs[0];const data=doc.data();
        if(data.pin!==saved.pin)return;
        if(data.role!=='chef'&&data.role!=='barman'&&data.role!=='super_admin')return;
        staffData={docId:doc.id,...data};
        startDash();
    }catch(e){}
}

// ═══════ DASHBOARD ═══════
async function startDash(){
    document.getElementById('authWrap').style.display='none';
    document.getElementById('dash').classList.add('on');
    document.getElementById('dOutlet').textContent=staffData.outletIds?staffData.outletIds.join(', '):'All outlets';
    setInterval(()=>document.getElementById('dTime').textContent=getISTTime(),1000);
    document.getElementById('dTime').textContent=getISTTime();
    await loadData();
    renderItems();
}

async function loadData(){
    // Load categories
    const catSnap=await db.collection('menu_categories').orderBy('sortOrder').get();
    allCategories=catSnap.docs.map(d=>({docId:d.id,...d.data()}));
    
    // Load menu items
    const itemSnap=await db.collection('menu_items').where('isActive','==',true).get();
    allMenuItems=itemSnap.docs.map(d=>({docId:d.id,id:d.data().id||d.id,...d.data()}));
    allMenuItems.sort((a,b)=>a.name.localeCompare(b.name));
    
    // Build category name map
    allMenuItems.forEach(item=>{
        const cat=allCategories.find(c=>c.id===item.categoryId);
        item._catName=cat?cat.name:'';
    });
    
    // Load current upsell state
    try{
        const mc=await db.collection('qr_settings').doc('menu_control').get();
        if(mc.exists) upsellIds=mc.data().upsellItems||[];
        else upsellIds=[];
    }catch(e){upsellIds=[];}
}

function renderItems(){
    const search=document.getElementById('itemSearch').value.toLowerCase().trim();
    
    // Pushed items
    const pushed=allMenuItems.filter(i=>upsellIds.includes(i.id));
    document.getElementById('pushedCount').textContent=pushed.length;
    
    if(pushed.length>0){
        document.getElementById('pushedSection').innerHTML=
            '<div class="section-title" style="margin-top:8px;">🔥 Currently Pushed</div>'+
            pushed.map(i=>renderItemRow(i,true)).join('');
    }else{
        document.getElementById('pushedSection').innerHTML=
            '<div style="text-align:center;font-size:12px;color:#555;padding:12px 0;">No items pushed yet. Search and push items below.</div>';
    }
    
    // All items (filtered by search)
    let items=allMenuItems;
    if(search){
        items=items.filter(i=>i.name.toLowerCase().includes(search)||(i._catName&&i._catName.toLowerCase().includes(search)));
    }
    // Exclude already pushed
    items=items.filter(i=>!upsellIds.includes(i.id));
    
    if(search){
        document.getElementById('allItemsSection').innerHTML=
            '<div class="section-title" style="margin-top:16px;">Search Results ('+items.length+')</div>'+
            (items.length>0?items.slice(0,50).map(i=>renderItemRow(i,false)).join(''):'<div style="font-size:12px;color:#555;padding:8px;">No items found</div>');
    }else{
        document.getElementById('allItemsSection').innerHTML=
            '<div class="section-title" style="margin-top:16px;">All Items ('+items.length+')</div>'+
            '<div style="font-size:11px;color:#555;margin-bottom:8px;">Search above to find items to push</div>';
    }
}

function renderItemRow(item,isPushed){
    const vc=item.vegType==='Veg'?'veg':item.vegType==='NonVeg'?'nonveg':item.vegType==='Egg'?'egg':'';
    const btnClass=isPushed?'push-btn off':'push-btn on';
    const btnText=isPushed?'REMOVE':'🔥 PUSH';
    return `<div class="item-row ${isPushed?'pushed':''}">
        <div class="item-left">
            <div class="item-name">${vc?`<span class="vd ${vc}"></span>`:''}${item.name}</div>
            <div class="item-cat">${item._catName}</div>
            <div class="item-price">₹${Math.round(item.price||item.defaultPrice||0)}</div>
        </div>
        <button class="${btnClass}" onclick="toggleUpsell('${item.id}',${isPushed?'false':'true'})">${btnText}</button>
    </div>`;
}

async function toggleUpsell(itemId,add){
    if(add){
        if(!upsellIds.includes(itemId)) upsellIds.push(itemId);
    }else{
        upsellIds=upsellIds.filter(id=>id!==itemId);
    }
    try{
        await db.collection('qr_settings').doc('menu_control').set({
            upsellItems:upsellIds,
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        },{merge:true});
        toast(add?'🔥 Pushed as special':'Removed from specials');
        renderItems();
    }catch(e){toast('Error: '+e.message);}
}

// ═══════ CATEGORY CONTROL (Dry Day) ═══════
let hiddenCats=[];
let hiddenSubcats=[];

async function openCatControl(){
    // Load current state
    try{
        const mc=await db.collection('qr_settings').doc('menu_control').get();
        if(mc.exists){
            hiddenCats=mc.data().hiddenCats||[];
            hiddenSubcats=mc.data().hiddenSubcats||[];
        }
    }catch(e){}
    
    const container=document.getElementById('catControlList');
    const activeCats=allCategories.filter(c=>c.isActive);
    container.innerHTML=activeCats.map(cat=>{
        const catId=cat.id||cat.docId;
        const isHidden=hiddenCats.includes(catId);
        const subcats=cat.subcategories||[];
        const scHtml=subcats.length>0?subcats.map(sc=>{
            const scOff=hiddenSubcats.includes(sc.id);
            return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0 6px 24px;border-bottom:1px solid #1e2030;">
                <span style="font-size:12px;color:#aaa;">${sc.name}</span>
                <label style="cursor:pointer;"><input type="checkbox" ${scOff?'':'checked'} onchange="toggleSubcatCtrl('${sc.id}',this.checked)" style="width:16px;height:16px;accent-color:#4ecdc4;cursor:pointer;"></label>
            </div>`;
        }).join(''):'';
        return `<div style="border:1px solid #252840;border-radius:8px;margin-bottom:8px;overflow:hidden;">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:${isHidden?'#ff6b6b10':'#1e2030'};">
                <span style="font-size:14px;font-weight:600;color:${isHidden?'#ff6b6b':'#e8e8e8'};">${cat.name}${isHidden?' (OFF)':''}</span>
                <label style="cursor:pointer;"><input type="checkbox" ${isHidden?'':'checked'} onchange="toggleCatCtrl('${catId}',this.checked)" style="width:18px;height:18px;accent-color:#4ecdc4;cursor:pointer;"></label>
            </div>
            ${scHtml}
        </div>`;
    }).join('');
    
    const modal=document.getElementById('catControlModal');
    modal.style.display='flex';
}

function closeCatControl(){document.getElementById('catControlModal').style.display='none';}

async function toggleCatCtrl(catId,isOn){
    hiddenCats=hiddenCats.filter(c=>c!==catId);
    if(!isOn) hiddenCats.push(catId);
    try{
        await db.collection('qr_settings').doc('menu_control').set({hiddenCats:hiddenCats,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
        toast(isOn?'✅ Category visible':'🚫 Category hidden');
        openCatControl();
    }catch(e){toast('Error: '+e.message);}
}

async function toggleSubcatCtrl(scId,isOn){
    hiddenSubcats=hiddenSubcats.filter(s=>s!==scId);
    if(!isOn) hiddenSubcats.push(scId);
    try{
        await db.collection('qr_settings').doc('menu_control').set({hiddenSubcats:hiddenSubcats,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
        toast(isOn?'✅ Subcategory visible':'🚫 Subcategory hidden');
        openCatControl();
    }catch(e){toast('Error: '+e.message);}
}

document.getElementById('catControlModal').addEventListener('click',function(e){if(e.target===this)closeCatControl();});

window.addEventListener('DOMContentLoaded',checkAutoLogin);
</script>
</body>
</html>
