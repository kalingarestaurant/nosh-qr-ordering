<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosh QR — Cashier</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Poppins',sans-serif;background:#0f1117;color:#e8e8e8;min-height:100vh;}
        .auth-wrap{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0f1117,#1a1a2e);}
        .auth-box{width:360px;text-align:center;}
        .auth-logo{font-size:24px;font-weight:800;color:#e94560;margin-bottom:20px;}
        .auth-err{color:#ff6b6b;font-size:13px;min-height:18px;margin-bottom:8px;}
        .auth-group{display:flex;gap:0;margin-bottom:12px;}
        .auth-pre{background:#1e2030;border:1.5px solid #2a2d3e;border-right:none;border-radius:8px 0 0 8px;padding:12px;font-size:14px;color:#888;}
        .auth-inp{flex:1;background:#1e2030;border:1.5px solid #2a2d3e;border-radius:0 8px 8px 0;padding:12px;font-size:15px;color:#fff;outline:none;font-family:'Poppins',sans-serif;}
        .auth-inp:focus{border-color:#e94560;}
        .auth-pin{width:100%;background:#1e2030;border:1.5px solid #2a2d3e;border-radius:8px;padding:12px;font-size:20px;color:#fff;outline:none;font-family:'Poppins',sans-serif;text-align:center;letter-spacing:8px;margin-bottom:12px;}
        .auth-pin:focus{border-color:#e94560;}
        .btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;}
        .btn-red{background:#e94560;color:#fff;}
        .auth-link{color:#666;font-size:12px;margin-top:10px;cursor:pointer;}
        .dash{display:none;flex-direction:column;min-height:100vh;}
        .dash.on{display:flex;}
        .topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#161822;border-bottom:1px solid #1e2030;flex-shrink:0;}
        .t-title{font-size:15px;font-weight:700;color:#e94560;}
        .t-outlet{font-size:11px;color:#666;}
        .topbar-right{display:flex;align-items:center;gap:8px;}
        .stat-box{text-align:center;}
        .stat-num{font-size:18px;font-weight:800;color:#fff;}
        .stat-lbl{font-size:9px;color:#666;text-transform:uppercase;}
        .tbtn{padding:5px 10px;border:1px solid #333;border-radius:6px;background:none;color:#888;font-size:10px;cursor:pointer;font-family:'Poppins',sans-serif;}
        .tbtn:hover{border-color:#e94560;color:#e94560;}
        .tbtn-gold{background:#FFB800;color:#000;border-color:#FFB800;}
        .sound-btn{width:32px;height:32px;border-radius:50%;border:1px solid #333;background:none;color:#888;font-size:16px;cursor:pointer;}
        .sound-btn.on{border-color:#e94560;color:#e94560;}
        .cols{display:flex;flex:1;overflow:hidden;}
        .col{flex:1;display:flex;flex-direction:column;border-right:1px solid #1e2030;overflow-y:auto;}
        .col:last-child{border-right:none;}
        .col-head{padding:10px 14px;background:#161822;border-bottom:1px solid #1e2030;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;}
        .col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
        .col-cnt{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;}
        .col-new .col-title{color:#ff6b6b;}.col-new .col-cnt{background:#ff6b6b20;color:#ff6b6b;}
        .col-done .col-title{color:#4ecdc4;}.col-done .col-cnt{background:#4ecdc420;color:#4ecdc4;}
        .col-body{flex:1;padding:10px;overflow-y:auto;}
        @media(max-width:900px){.cols{flex-direction:column;}.col{max-height:45vh;border-right:none;border-bottom:1px solid #1e2030;}}
        .tile{background:#1a1c2e;border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:4px solid transparent;cursor:pointer;transition:background 0.2s;}
        .tile:hover{background:#22243a;}
        .tile.new{border-left-color:#ff6b6b;}
        .tile.done{border-left-color:#4ecdc4;}
        .tile.cancelled{border-left-color:#666;opacity:0.5;}
        .tile.new.pulse{animation:pulse 1.5s ease-in-out infinite;}
        @keyframes pulse{0%,100%{box-shadow:none;}50%{box-shadow:0 0 20px 4px rgba(255,107,107,0.3);}}
        .tile-r1{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
        .tile-num{font-size:17px;font-weight:800;color:#fff;}
        .tile-tbl{font-size:11px;font-weight:600;color:#e94560;background:#e9456015;padding:2px 8px;border-radius:6px;}
        .tile-items{font-size:11px;color:#999;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .tile-r2{display:flex;justify-content:space-between;font-size:11px;color:#666;}
        .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;justify-content:center;align-items:center;}
        .modal-bg.on{display:flex;}
        .modal-box{background:#1a1c2e;border-radius:16px;padding:24px;width:95%;max-width:620px;max-height:85vh;overflow-y:auto;}
        .od-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
        .od-title{font-size:26px;font-weight:800;color:#fff;}
        .od-title-sub{font-size:13px;font-weight:500;color:#666;margin-top:2px;}
        .od-x{background:none;border:none;color:#888;font-size:26px;cursor:pointer;}
        .od-info{display:flex;gap:16px;margin-bottom:16px;font-size:14px;color:#888;flex-wrap:wrap;}
        .od-items{border-top:1px solid #252840;padding-top:12px;}
        .od-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #1e2030;}
        .od-qty{font-size:18px;font-weight:700;color:#e94560;min-width:36px;}
        .od-det{flex:1;}
        .od-name{font-size:16px;font-weight:600;color:#e8e8e8;display:flex;align-items:center;gap:6px;}
        .od-mods{font-size:13px;color:#f0a500;margin-top:3px;}
        .od-instr{font-size:13px;color:#e94560;font-style:italic;margin-top:3px;}
        .od-price{font-size:15px;color:#aaa;font-weight:600;}
        .vd{width:14px;height:14px;border:1.5px solid;border-radius:2px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
        .vd::after{content:'';width:7px;height:7px;border-radius:50%;}
        .vd.veg{border-color:#0a8f0a;}.vd.veg::after{background:#0a8f0a;}
        .vd.nonveg{border-color:#ff4444;}.vd.nonveg::after{background:#ff4444;}
        .vd.egg{border-color:#f9a825;}.vd.egg::after{background:#f9a825;}
        .od-total{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid #252840;margin-top:8px;}
        .od-actions{display:flex;gap:12px;margin-top:16px;}
        .od-btn{flex:1;padding:16px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;}
        .od-accept{background:#2ecc71;color:#fff;}
        .od-cancel{background:#1e2030;color:#ff6b6b;border:1px solid #ff6b6b30;}
        .bottom-bar{padding:8px 16px;background:#161822;border-top:1px solid #1e2030;display:flex;align-items:center;gap:10px;flex-shrink:0;}
        .bb-select{background:#1e2030;border:1px solid #2a2d3e;border-radius:6px;padding:7px 10px;color:#fff;font-size:12px;font-family:'Poppins',sans-serif;outline:none;}
        .bb-btn{padding:7px 14px;background:#e94560;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;}
        .avail-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1e2030;}
        .avail-name{font-size:13px;color:#e8e8e8;}
        .atgl{position:relative;width:40px;height:22px;background:#333;border-radius:11px;cursor:pointer;transition:background 0.2s;}
        .atgl.on{background:#2ecc71;}
        .atgl::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform 0.2s;}
        .atgl.on::after{transform:translateX(18px);}
        .empty{text-align:center;padding:30px;color:#444;font-size:13px;}
        .empty .ei{font-size:36px;display:block;margin-bottom:6px;}
        #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all 0.25s;pointer-events:none;}
        #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
        #toast.ok{background:#2ecc71;color:#fff;}
        #toast.err{background:#ff6b6b;color:#fff;}
    </style>
</head>
<body>

<div id="authWrap" class="auth-wrap"><div class="auth-box">
    <div class="auth-logo">NOSH QR — Cashier</div>
    <div id="loginStep">
        <div class="auth-err" id="loginErr"></div>
        <div class="auth-group"><span class="auth-pre">+91</span><input type="tel" class="auth-inp" id="inpPhone" placeholder="Phone number" maxlength="10" inputmode="numeric"></div>
        <input type="password" class="auth-pin" id="inpPin" placeholder="PIN" maxlength="6" inputmode="numeric" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn btn-red" onclick="doLogin()">Login</button>
    </div>
    <div id="setPinStep" style="display:none;">
        <div style="font-size:14px;color:#888;margin-bottom:12px;">Set Your New PIN</div>
        <div class="auth-err" id="setPinErr"></div>
        <input type="password" class="auth-pin" id="inpNewPin" placeholder="New PIN (4+ digits)" maxlength="6" inputmode="numeric">
        <input type="password" class="auth-pin" id="inpConfirmPin" placeholder="Confirm PIN" maxlength="6" inputmode="numeric" onkeydown="if(event.key==='Enter')saveNewPin()">
        <button class="btn btn-red" onclick="saveNewPin()">Save PIN & Continue</button>
        <div class="auth-link" onclick="skipPin()">Skip for now</div>
    </div>
</div></div>

<div id="outletModal" class="modal-bg"><div class="modal-box" style="max-width:360px;text-align:center;">
    <div style="font-size:18px;font-weight:700;color:#e94560;margin-bottom:14px;">Select Outlet</div>
    <select id="outletSelect" style="width:100%;background:#0f1117;border:1.5px solid #2a2d3e;border-radius:8px;padding:12px;color:#fff;font-size:14px;font-family:'Poppins',sans-serif;margin-bottom:12px;outline:none;"></select>
    <button class="btn btn-red" onclick="enterDash()">Enter Dashboard</button>
</div></div>

<div id="changePinModal" class="modal-bg"><div class="modal-box" style="max-width:360px;">
    <div class="od-head"><span class="od-title">🔑 Change PIN</span><button class="od-x" onclick="closeM('changePinModal')">✕</button></div>
    <div class="auth-err" id="cpErr"></div>
    <input type="password" class="auth-pin" id="cpCurrent" placeholder="Current PIN" maxlength="6" inputmode="numeric">
    <input type="password" class="auth-pin" id="cpNew" placeholder="New PIN" maxlength="6" inputmode="numeric">
    <input type="password" class="auth-pin" id="cpConfirm" placeholder="Confirm" maxlength="6" inputmode="numeric">
    <button class="btn btn-red" onclick="saveChangedPin()">Save PIN</button>
</div></div>

<div id="detailModal" class="modal-bg"><div class="modal-box" id="detailContent"></div></div>

<div id="availModal" class="modal-bg"><div class="modal-box">
    <div class="od-head"><span>86 — Item Availability</span><button class="od-x" onclick="closeM('availModal')">✕</button></div>
    <input type="text" id="availSearch" placeholder="Search items..." oninput="filterAvail()" style="width:100%;padding:10px;background:#0f1117;border:1px solid #2a2d3e;border-radius:8px;color:#fff;font-size:13px;font-family:'Poppins',sans-serif;outline:none;margin-bottom:10px;">
    <div id="availList"></div>
</div></div>

<div id="cancelModal" class="modal-bg"><div class="modal-box" style="max-width:400px;">
    <div class="od-head"><span>Cancel Order</span><button class="od-x" onclick="closeM('cancelModal')">✕</button></div>
    <div style="font-size:13px;color:#888;margin-bottom:10px;" id="cancelInfo"></div>
    <textarea id="cancelReason" placeholder="Reason for cancellation..." style="width:100%;padding:10px;background:#0f1117;border:1px solid #2a2d3e;border-radius:8px;color:#fff;font-size:13px;font-family:'Poppins',sans-serif;resize:none;height:70px;outline:none;margin-bottom:10px;"></textarea>
    <button class="btn btn-red" style="background:#ff6b6b;" onclick="confirmCancel()">Cancel Order</button>
</div></div>

<div id="dash" class="dash">
    <div class="topbar">
        <div><div class="t-title">NOSH QR ORDERS</div><div class="t-outlet" id="dOutlet">-</div></div>
        <div class="topbar-right">
            <div class="stat-box"><div class="stat-num" id="sNew">0</div><div class="stat-lbl">New</div></div>
            <div class="stat-box"><div class="stat-num" id="sTotal">0</div><div class="stat-lbl">Today</div></div>
            <button class="sound-btn on" id="soundBtn" onclick="toggleSound()">🔔</button>
            <select id="alarmSelect" onchange="changeAlarm()" style="background:#1e2030;border:1px solid #2a2d3e;border-radius:6px;padding:5px 8px;color:#fff;font-size:10px;font-family:'Poppins',sans-serif;outline:none;cursor:pointer;">
                <option value="bell">🔔 Bell</option>
                <option value="chime">🎵 Chime</option>
                <option value="urgent">🚨 Urgent</option>
                <option value="ding">✨ Ding</option>
                <option value="doorbell">🚪 Doorbell</option>
            </select>
            <button class="tbtn" style="font-size:9px;" onclick="previewAlarm()">▶ Test</button>
            <button class="tbtn" onclick="openAvail()">86 Items</button>
            <button class="tbtn tbtn-gold" onclick="openM('changePinModal')">🔑</button>
            <span style="font-size:11px;color:#666;" id="dTime"></span>
            <button class="tbtn" onclick="doLogout()">Logout</button>
        </div>
    </div>
    <div style="padding:8px 16px;background:#161822;border-bottom:1px solid #1e2030;">
        <input type="text" id="orderSearch" placeholder="🔍 Search by table number or item name..." oninput="render()" style="width:100%;padding:9px 14px;background:#0f1117;border:1.5px solid #2a2d3e;border-radius:8px;color:#fff;font-size:13px;font-family:'Poppins',sans-serif;outline:none;">
    </div>
    <div class="cols">
        <div class="col col-new"><div class="col-head"><span class="col-title">🔴 New Orders</span><span class="col-cnt" id="cntNew">0</span></div><div class="col-body" id="colNew"></div></div>
        <div class="col col-done"><div class="col-head"><span class="col-title">🟢 Entered into POS</span><span class="col-cnt" id="cntDone">0</span></div><div class="col-body" id="colDone"></div></div>
    </div>
    <div class="bottom-bar">
        <span style="font-size:12px;color:#888;">Clear Table:</span>
        <input type="tel" id="quickClearInput" placeholder="Table #" inputmode="numeric" maxlength="5" style="width:70px;background:#0f1117;border:1.5px solid #2a2d3e;border-radius:6px;padding:7px 10px;color:#fff;font-size:14px;font-weight:700;font-family:'Poppins',sans-serif;outline:none;text-align:center;" onkeydown="if(event.key==='Enter')quickClearTable()" onfocus="this.style.borderColor='#e94560'" onblur="this.style.borderColor='#2a2d3e'">
        <span style="font-size:11px;color:#444;">|</span>
        <select id="clearSelect" class="bb-select"></select>
        <button class="bb-btn" onclick="clearTable()">Clear</button>
    </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyBHmyK6NTVuSsKCh-969SElL1EEnq9Ln0M",authDomain:"nosh-qr-ordering-trial.firebaseapp.com",projectId:"nosh-qr-ordering-trial",storageBucket:"nosh-qr-ordering-trial.firebasestorage.app",messagingSenderId:"672306605373",appId:"1:672306605373:web:c234755331d045142c6954"});
const db=firebase.firestore();

function getIST(){return new Date(Date.now()+5.5*60*60*1000);}
function getISTDate(){const d=getIST();return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}
function getISTTime(){const d=getIST();let h=d.getUTCHours(),m=d.getUTCMinutes(),s=d.getUTCSeconds();const a=h>=12?'PM':'AM';h=h%12||12;return h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+' '+a;}
function toast(m,t='ok'){const e=document.getElementById('toast');e.textContent=m;e.className='show '+t;setTimeout(()=>e.className='',2800);}
function openM(id){document.getElementById(id).classList.add('on');}
function closeM(id){document.getElementById(id).classList.remove('on');}

let staffPhone='',staffRole='',staffOutletIds=[],selectedOutletId='',selectedOutletName='';
let allOrders=[],allMenuItems=[],ordersListener=null,soundEnabled=true,lastNewCount=0,alertInt=null,cancelDocId='';

async function doLogin(){
    const ph=document.getElementById('inpPhone').value.trim(),pin=document.getElementById('inpPin').value.trim();
    if(!/^\d{10}$/.test(ph)){document.getElementById('loginErr').textContent='Enter 10-digit number';return;}
    if(!pin){document.getElementById('loginErr').textContent='Enter PIN';return;}
    document.getElementById('loginErr').textContent='';staffPhone='+91'+ph;
    try{
        const doc=await db.collection('qr_staff').doc(staffPhone).get();
        if(!doc.exists){document.getElementById('loginErr').textContent='User not found';return;}
        const d=doc.data();
        if(!d.isActive){document.getElementById('loginErr').textContent='Account disabled';return;}
        if((d.pin||'1234')!==pin){document.getElementById('loginErr').textContent='Wrong PIN';return;}
        staffRole=d.role;staffOutletIds=d.outletIds||[];
        localStorage.setItem('nosh_cashier',JSON.stringify({phone:staffPhone,at:Date.now()}));
        if(!d.pin||d.pin==='1234'){document.getElementById('loginStep').style.display='none';document.getElementById('setPinStep').style.display='block';return;}
        await pickOutlet();
    }catch(e){document.getElementById('loginErr').textContent='Error: '+e.message;}
}
async function saveNewPin(){
    const n=document.getElementById('inpNewPin').value.trim(),c=document.getElementById('inpConfirmPin').value.trim();
    if(n.length<4){document.getElementById('setPinErr').textContent='4+ digits required';return;}
    if(n!==c){document.getElementById('setPinErr').textContent='PINs do not match';return;}
    if(n==='1234'){document.getElementById('setPinErr').textContent='Choose different PIN';return;}
    try{await db.collection('qr_staff').doc(staffPhone).update({pin:n});toast('✅ PIN saved!');await pickOutlet();}catch(e){document.getElementById('setPinErr').textContent='Error: '+e.message;}
}
function skipPin(){pickOutlet();}
async function saveChangedPin(){
    const cur=document.getElementById('cpCurrent').value.trim(),n=document.getElementById('cpNew').value.trim(),c=document.getElementById('cpConfirm').value.trim();
    const doc=await db.collection('qr_staff').doc(staffPhone).get();
    if(cur!==(doc.data()?.pin||'1234')){document.getElementById('cpErr').textContent='Wrong current PIN';return;}
    if(n.length<4){document.getElementById('cpErr').textContent='4+ digits';return;}
    if(n!==c){document.getElementById('cpErr').textContent='Do not match';return;}
    try{await db.collection('qr_staff').doc(staffPhone).update({pin:n});toast('✅ PIN changed!');closeM('changePinModal');}catch(e){toast('Error','err');}
}
async function pickOutlet(){
    let outs=[];
    if(staffOutletIds.includes('all')){const s=await db.collection('qr_outlets').where('isActive','==',true).get();outs=s.docs.map(d=>d.data());}
    else{for(const id of staffOutletIds){const d=await db.collection('qr_outlets').doc(id).get();if(d.exists&&d.data().isActive)outs.push(d.data());}}
    if(!outs.length){document.getElementById('loginErr').textContent='No outlets assigned';return;}
    if(outs.length===1){selectedOutletId=outs[0].id;selectedOutletName=outs[0].name;startDash();return;}
    document.getElementById('outletSelect').innerHTML=outs.map(o=>`<option value="${o.id}">${o.name}</option>`).join('');
    document.getElementById('authWrap').style.display='none';openM('outletModal');
}
function enterDash(){const s=document.getElementById('outletSelect');selectedOutletId=s.value;selectedOutletName=s.options[s.selectedIndex].text;closeM('outletModal');startDash();}
async function checkAutoLogin(){
    const s=localStorage.getItem('nosh_cashier');if(!s)return;
    try{const l=JSON.parse(s);if(Date.now()-l.at>12*3600000){localStorage.removeItem('nosh_cashier');return;}
    const d=await db.collection('qr_staff').doc(l.phone).get();if(!d.exists||!d.data().isActive){localStorage.removeItem('nosh_cashier');return;}
    staffPhone=l.phone;staffRole=d.data().role;staffOutletIds=d.data().outletIds||[];
    const lo=localStorage.getItem('nosh_cashier_outlet');
    if(lo){const od=await db.collection('qr_outlets').doc(lo).get();if(od.exists&&od.data().isActive){selectedOutletId=lo;selectedOutletName=od.data().name;startDash();return;}}
    await pickOutlet();}catch(e){console.error(e);}
}
function doLogout(){localStorage.removeItem('nosh_cashier');localStorage.removeItem('nosh_cashier_outlet');if(ordersListener)ordersListener();location.reload();}

function startDash(){
    document.getElementById('authWrap').style.display='none';document.getElementById('dash').classList.add('on');
    document.getElementById('dOutlet').textContent=selectedOutletName;localStorage.setItem('nosh_cashier_outlet',selectedOutletId);
    setInterval(()=>{document.getElementById('dTime').textContent=getISTTime();},1000);document.getElementById('dTime').textContent=getISTTime();
    loadAlarmPref();loadMenuItems();loadTables();loadTablesData();startListener();
    // Refresh table data every 30 seconds for quick clear
    setInterval(()=>{loadTablesData();loadTables();},30000);
    focusClearInput();
    // Run daily reset check now and every 5 minutes
    dailyResetCheck();
    setInterval(dailyResetCheck, 5*60*1000);
}

// ═══════ DAILY RESET (configurable per outlet) ═══════
async function dailyResetCheck(){
    const ist=getIST();
    const hour=ist.getUTCHours();
    const todayStr=getISTDate();
    const lastReset=localStorage.getItem('nosh_last_reset_'+selectedOutletId);

    // Get outlet's reset hour (default 6 AM)
    let resetHour=6;
    try{
        const outDoc=await db.collection('qr_outlets').doc(selectedOutletId).get();
        if(outDoc.exists && outDoc.data().resetHour!==undefined) resetHour=outDoc.data().resetHour;
    }catch(e){}

    if(hour<resetHour) return; // before reset hour
    if(lastReset===todayStr) return; // already reset today

    console.log('Running daily reset (hour '+resetHour+') for '+selectedOutletName);

    try{
        // 1. Clear ALL stale table sessions (any date before today's reset)
        const tablesSnap=await db.collection('qr_tables').where('outletId','==',selectedOutletId).get();
        const batch=db.batch();

        for(const d of tablesSnap.docs){
            const data=d.data();
            if(!data.currentSessionId) continue;
            const sessDoc=await db.collection('qr_sessions').doc(data.currentSessionId).get();
            if(!sessDoc.exists){
                batch.update(d.ref,{currentSessionId:''});
                continue;
            }
            const sessData=sessDoc.data();
            // Clear if session was created before today's reset hour
            const sessCreated=sessData.verifiedAt||0;
            const resetTimestamp=getTodayResetTimestamp(resetHour);
            if(sessCreated<resetTimestamp){
                batch.update(d.ref,{currentSessionId:''});
                if(sessData.isActive) batch.update(sessDoc.ref,{isActive:false});
            }
        }
        await batch.commit();

        // 2. Mark ALL processed orders (accepted/served/cancelled) as cleared
        //    regardless of date — catches 12AM-5AM orders for late-night restaurants
        //    Only keeps NEW orders visible
        const allOrdersSnap=await db.collection('qr_orders')
            .where('outletId','==',selectedOutletId)
            .where('cleared','==',false)
            .get()
            .catch(()=>null); // field might not exist on old orders

        // Fallback: get recent orders without cleared filter
        const recentSnap=allOrdersSnap||await db.collection('qr_orders')
            .where('outletId','==',selectedOutletId)
            .where('dateString','>=',getYesterdayISTDate())
            .get();

        if(recentSnap&&recentSnap.size>0){
            // Firestore batch limit is 500
            let batchOps=db.batch();
            let count=0;
            recentSnap.docs.forEach(d=>{
                const data=d.data();
                if(data.cleared) return; // already cleared
                if(data.status==='new') return; // keep new orders visible
                batchOps.update(d.ref,{cleared:true});
                count++;
                if(count>=450){batchOps.commit();batchOps=db.batch();count=0;}
            });
            if(count>0) await batchOps.commit();
        }

        localStorage.setItem('nosh_last_reset_'+selectedOutletId, todayStr);
        loadTables();
        toast('🌅 Daily reset — old orders and tables cleared');
        console.log('Daily reset complete');
    }catch(e){
        console.error('Daily reset error:',e);
    }
}

function getTodayResetTimestamp(resetHour){
    // Get today's date in IST, set to resetHour:00:00, return as ms timestamp
    const ist=getIST();
    const y=ist.getUTCFullYear(),m=ist.getUTCMonth(),d=ist.getUTCDate();
    // Create IST date at resetHour, convert back to UTC timestamp
    return Date.UTC(y,m,d,resetHour,0,0) - (5.5*60*60*1000);
}

function getYesterdayISTDate(){
    const d=new Date(Date.now()+5.5*60*60*1000 - 24*60*60*1000);
    return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
}
function startListener(){
    ordersListener=db.collection('qr_orders').where('outletId','==',selectedOutletId).where('dateString','==',getISTDate()).orderBy('createdAt','desc')
        .onSnapshot(snap=>{allOrders=snap.docs.map(d=>({docId:d.id,...d.data()}));render();
        const nc=allOrders.filter(o=>o.status==='new'&&!o.cleared).length;if(nc>lastNewCount&&lastNewCount>=0)playAlert();lastNewCount=nc;});
}
function render(){
    const q=(document.getElementById('orderSearch').value||'').toLowerCase().trim();
    // Filter out cleared orders (table was cleared by cashier)
    let visible=allOrders.filter(o=>!o.cleared);
    if(q){
        visible=visible.filter(o=>{
            if(String(o.tableNumber)===q)return true;
            if((o.tableName||'').toLowerCase().includes(q))return true;
            if((o.items||[]).some(i=>i.name.toLowerCase().includes(q)))return true;
            return false;
        });
    }
    const nw=visible.filter(o=>o.status==='new'),dn=visible.filter(o=>o.status!=='new');
    document.getElementById('cntNew').textContent=nw.length;document.getElementById('cntDone').textContent=dn.length;
    document.getElementById('sNew').textContent=allOrders.filter(o=>o.status==='new'&&!o.cleared).length;document.getElementById('sTotal').textContent=allOrders.filter(o=>!o.cleared).length;
    document.getElementById('colNew').innerHTML=nw.length?nw.map(o=>tile(o,'new')).join(''):'<div class="empty"><span class="ei">✨</span>'+(q?'No matching orders':'No new orders')+'</div>';
    document.getElementById('colDone').innerHTML=dn.length?dn.slice(0,30).map(o=>tile(o,o.status==='cancelled'?'cancelled':'done')).join(''):'<div class="empty"><span class="ei">📋</span>'+(q?'No matching orders':'No orders yet')+'</div>';
}
function tile(o,cls){
    const items=(o.items||[]).slice(0,3).map(i=>i.qty+'× '+i.name).join(', ');
    const more=(o.items||[]).length>3?' +'+(o.items.length-3)+' more':'';
    return `<div class="tile ${cls}${cls==='new'?' pulse':''}" onclick="openDetail('${o.docId}')">
        <div class="tile-r1"><span class="tile-num">#${o.orderNumber}</span><span class="tile-tbl">${o.tableName||'Table '+o.tableNumber}</span></div>
        <div class="tile-items">${items}${more}</div>
        <div class="tile-r2"><span>${o.createdAtIST||''}</span>${o.customerName?`<span>👤 ${o.customerName}</span>`:''}<span>${o.itemCount||0} item${(o.itemCount||0)>1?'s':''}</span></div>
        ${cls==='cancelled'?'<div style="font-size:10px;color:#ff6b6b;margin-top:3px;">Cancelled</div>':''}
    </div>`;
}
function openDetail(docId){
    const o=allOrders.find(x=>x.docId===docId);if(!o)return;
    const isNew=o.status==='new',isCan=o.status==='cancelled';
    const badge=isNew?'background:#ff6b6b20;color:#ff6b6b':isCan?'background:#66666630;color:#888':'background:#4ecdc420;color:#4ecdc4';
    const badgeTxt=isNew?'🔴 New Order':isCan?'❌ Cancelled':'✅ Entered into POS';
    const ph=o.customerPhone?o.customerPhone.replace('+91',''):'';const dph=ph?ph.replace(/(\d{5})(\d{5})/,'$1 $2'):'';
    const itemsH=(o.items||[]).map(i=>{
        const vc=i.vegType==='Veg'?'veg':i.vegType==='NonVeg'?'nonveg':i.vegType==='Egg'?'egg':'';
        const ms=(i.modifiers||[]).map(m=>m.option).join(', ');const pr=i.price+(i.modifiers||[]).reduce((s,m)=>s+(m.extraPrice||0),0);
        return `<div class="od-item"><div class="od-qty">${i.qty}×</div><div class="od-det"><div class="od-name">${vc?`<span class="vd ${vc}"></span>`:''}${i.name}</div>${ms?`<div class="od-mods">↳ ${ms}</div>`:''}${i.specialInstructions?`<div class="od-instr">"${i.specialInstructions}"</div>`:''}</div><div class="od-price">₹${Math.round(pr*i.qty)}</div></div>`;
    }).join('');
    const acts=isNew?`<div class="od-actions"><button class="od-btn od-accept" onclick="acceptOrder('${o.docId}')">✓ Entered into POS</button><button class="od-btn od-cancel" onclick="closeM('detailModal');openCancel('${o.docId}',${o.orderNumber})">Cancel</button></div>`:'';
    document.getElementById('detailContent').innerHTML=`
        <div class="od-head"><div><div class="od-title">🪑 ${o.tableName||'Table '+o.tableNumber}</div><div class="od-title-sub">Order #${o.orderNumber}</div></div><button class="od-x" onclick="closeM('detailModal')">✕</button></div>
        <div style="${badge};display:inline-block;padding:4px 12px;border-radius:8px;font-size:13px;font-weight:700;margin-bottom:14px;">${badgeTxt}</div>
        <div class="od-info"><span>🕐 ${o.createdAtIST||''}</span>${o.customerName?`<span>👤 ${o.customerName}</span>`:''}${dph?`<span>📱 ${dph}</span>`:''}</div>
        <div class="od-items">${itemsH}</div>
        <div class="od-total"><span style="color:#888;font-size:16px;">Total (ref)</span><span style="font-size:22px;font-weight:800;">₹${Math.round(o.orderTotal||0)}</span></div>
        ${isCan&&o.cancelReason?`<div style="font-size:14px;color:#ff6b6b;margin-top:12px;padding:10px;background:#ff6b6b10;border-radius:8px;">Cancelled: ${o.cancelReason}</div>`:''}${acts}`;
    openM('detailModal');
}
document.getElementById('detailModal').addEventListener('click',function(e){if(e.target===this)closeM('detailModal');});
async function acceptOrder(id){try{await db.collection('qr_orders').doc(id).update({status:'accepted',acceptedAt:firebase.firestore.FieldValue.serverTimestamp()});closeM('detailModal');stopAlert();toast('✅ Entered into POS');focusClearInput();}catch(e){alert('Error: '+e.message);}}
function openCancel(id,num){cancelDocId=id;document.getElementById('cancelInfo').textContent='Order #'+num;document.getElementById('cancelReason').value='';openM('cancelModal');}
async function confirmCancel(){const r=document.getElementById('cancelReason').value.trim();if(!r){alert('Enter reason');return;}try{await db.collection('qr_orders').doc(cancelDocId).update({status:'cancelled',cancelledAt:firebase.firestore.FieldValue.serverTimestamp(),cancelReason:r});closeM('cancelModal');stopAlert();toast('Order cancelled');focusClearInput();}catch(e){alert('Error: '+e.message);}}

function toggleSound(){soundEnabled=!soundEnabled;const b=document.getElementById('soundBtn');b.textContent=soundEnabled?'🔔':'🔕';b.classList.toggle('on',soundEnabled);if(!soundEnabled)stopAlert();}

// ═══════ ALARM SYSTEM (Web Audio API) ═══════
let audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

const ALARMS={
    bell:function(){
        const ctx=getAudioCtx();const t=ctx.currentTime;
        [800,1000,800,1000].forEach((f,i)=>{
            const o=ctx.createOscillator();const g=ctx.createGain();
            o.type='sine';o.frequency.value=f;
            g.gain.setValueAtTime(0.3,t+i*0.15);g.gain.exponentialRampToValueAtTime(0.01,t+i*0.15+0.14);
            o.connect(g);g.connect(ctx.destination);o.start(t+i*0.15);o.stop(t+i*0.15+0.15);
        });
    },
    chime:function(){
        const ctx=getAudioCtx();const t=ctx.currentTime;
        [523,659,784,1047].forEach((f,i)=>{
            const o=ctx.createOscillator();const g=ctx.createGain();
            o.type='sine';o.frequency.value=f;
            g.gain.setValueAtTime(0.25,t+i*0.2);g.gain.exponentialRampToValueAtTime(0.01,t+i*0.2+0.4);
            o.connect(g);g.connect(ctx.destination);o.start(t+i*0.2);o.stop(t+i*0.2+0.45);
        });
    },
    urgent:function(){
        const ctx=getAudioCtx();const t=ctx.currentTime;
        for(let i=0;i<6;i++){
            const o=ctx.createOscillator();const g=ctx.createGain();
            o.type='square';o.frequency.value=i%2===0?880:660;
            g.gain.setValueAtTime(0.2,t+i*0.12);g.gain.exponentialRampToValueAtTime(0.01,t+i*0.12+0.1);
            o.connect(g);g.connect(ctx.destination);o.start(t+i*0.12);o.stop(t+i*0.12+0.11);
        }
    },
    ding:function(){
        const ctx=getAudioCtx();const t=ctx.currentTime;
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.type='sine';o.frequency.value=1200;
        g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.8);
        o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.85);
    },
    doorbell:function(){
        const ctx=getAudioCtx();const t=ctx.currentTime;
        [659,523].forEach((f,i)=>{
            const o=ctx.createOscillator();const g=ctx.createGain();
            o.type='sine';o.frequency.value=f;
            g.gain.setValueAtTime(0.3,t+i*0.4);g.gain.exponentialRampToValueAtTime(0.01,t+i*0.4+0.35);
            o.connect(g);g.connect(ctx.destination);o.start(t+i*0.4);o.stop(t+i*0.4+0.4);
        });
    }
};

let selectedAlarm='bell';
function changeAlarm(){selectedAlarm=document.getElementById('alarmSelect').value;localStorage.setItem('nosh_alarm',selectedAlarm);}
function previewAlarm(){try{ALARMS[selectedAlarm]();}catch(e){console.error(e);}}
function loadAlarmPref(){const s=localStorage.getItem('nosh_alarm');if(s&&ALARMS[s]){selectedAlarm=s;document.getElementById('alarmSelect').value=s;}}

function playAlert(){if(!soundEnabled)return;stopAlert();try{ALARMS[selectedAlarm]();}catch(e){}alertInt=setInterval(()=>{try{ALARMS[selectedAlarm]();}catch(e){}},8000);}
function stopAlert(){if(alertInt){clearInterval(alertInt);alertInt=null;}}

async function loadMenuItems(){const s=await db.collection('menu_items').where('isActive','==',true).get();allMenuItems=s.docs.map(d=>({docId:d.id,...d.data()}));allMenuItems.sort((a,b)=>a.name.localeCompare(b.name));}
function openAvail(){filterAvail();document.getElementById('availSearch').value='';openM('availModal');}
function filterAvail(){const q=(document.getElementById('availSearch').value||'').toLowerCase();let items=allMenuItems;if(q)items=items.filter(i=>i.name.toLowerCase().includes(q));document.getElementById('availList').innerHTML=items.slice(0,50).map(i=>`<div class="avail-item"><span class="avail-name">${i.name}</span><div class="atgl ${i.isAvailable?'on':''}" onclick="toggleAvail('${i.docId}',${!i.isAvailable})"></div></div>`).join('');}
async function toggleAvail(id,v){try{await db.collection('menu_items').doc(id).update({isAvailable:v,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});const i=allMenuItems.find(x=>x.docId===id);if(i)i.isAvailable=v;filterAvail();toast(v?'✅ Available':'🚫 86\'d');}catch(e){toast('Error','err');}}

async function loadTables(){
    const s=await db.collection('qr_tables').where('outletId','==',selectedOutletId).get();
    const t=s.docs.map(d=>d.data()).filter(t=>t.isActive && t.currentSessionId).sort((a,b)=>a.tableNumber-b.tableNumber);
    document.getElementById('clearSelect').innerHTML='<option value="">Select...</option>'+t.map(t=>`<option value="${t.id}">${t.tableName}</option>`).join('');
}
async function clearTable(){
    const id=document.getElementById('clearSelect').value;
    if(!id){alert('Select a table');return;}
    try{
        const td=await db.collection('qr_tables').doc(id).get();
        const sid=td.data()?.currentSessionId;
        const tblName=td.data()?.tableName||'';
        if(sid){
            await db.collection('qr_sessions').doc(sid).update({isActive:false}).catch(()=>{});
            const orderSnap=await db.collection('qr_orders').where('sessionId','==',sid).get();
            const batch=db.batch();
            orderSnap.docs.forEach(d=>{batch.update(d.ref,{cleared:true});});
            await batch.commit();
        }
        await db.collection('qr_tables').doc(id).update({currentSessionId:''});
        document.getElementById('clearSelect').value='';
        loadTables();loadTablesData();
        toast('✅ '+tblName+' cleared!');
        focusClearInput();
    }catch(e){alert('Error: '+e.message);}
}

async function quickClearTable(){
    const num=document.getElementById('quickClearInput').value.trim();
    if(!num)return;
    const tableNum=parseInt(num);
    if(isNaN(tableNum)){toast('Enter a valid number','err');focusClearInput();return;}
    
    const table=allTablesData.find(t=>t.tableNumber===tableNum);
    if(!table){toast('❌ Table '+tableNum+' not found','err');focusClearInput();return;}
    if(!table.currentSessionId){toast('❌ Table '+tableNum+' is not occupied','err');focusClearInput();return;}
    
    try{
        const sid=table.currentSessionId;
        await db.collection('qr_sessions').doc(sid).update({isActive:false}).catch(()=>{});
        const orderSnap=await db.collection('qr_orders').where('sessionId','==',sid).get();
        if(orderSnap.size>0){const batch=db.batch();orderSnap.docs.forEach(d=>{batch.update(d.ref,{cleared:true});});await batch.commit();}
        await db.collection('qr_tables').doc(table.id||table.docId).update({currentSessionId:''});
        loadTables();loadTablesData();
        toast('✅ Table '+tableNum+' cleared!');
    }catch(e){toast('Error: '+e.message,'err');}
    focusClearInput();
}

let allTablesData=[];
async function loadTablesData(){
    const s=await db.collection('qr_tables').where('outletId','==',selectedOutletId).get();
    allTablesData=s.docs.map(d=>({docId:d.id,...d.data()}));
}
function focusClearInput(){const inp=document.getElementById('quickClearInput');if(inp){inp.value='';setTimeout(()=>inp.focus(),100);}}

['availModal','cancelModal','changePinModal','outletModal'].forEach(id=>{document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeM(id);});});
